<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐭 mouseDZ-ai - توليد فيديوهات احترافية</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-wrapper">
                <span class="logo-emoji">🐭</span>
                <h1 class="logo">mouse<span class="logo-highlight">DZ</span>-ai</h1>
            </div>
            <p class="subtitle">توليد فيديوهات احترافية بالذكاء الاصطناعي</p>
            <div class="badges">
                <span class="badge free">✨ مجاني للاختبار</span>
                <span class="badge beta">🧪 نسخة عملية</span>
            </div>
        </header>

        <!-- TABS -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="text2video">📹 نص إلى فيديو</button>
            <button class="tab-btn" data-tab="image2video">🖼️ صورة إلى فيديو</button>
        </nav>

        <!-- TAB: نص إلى فيديو -->
        <div class="tab-content active" id="tab-text2video">
            <div class="form-group">
                <label for="promptInput">📝 وصف الفيديو</label>
                <textarea id="promptInput" rows="4" placeholder="مثلاً: غروب شمس فوق جبال، بأسلوب سينمائي">غروب شمس فوق جبال الأطلس، بأسلوب سينمائي، ألوان دافئة</textarea>
            </div>
        </div>

        <!-- TAB: صورة إلى فيديو -->
        <div class="tab-content" id="tab-image2video">
            <div class="form-group">
                <label for="promptInputImage">📝 وصف الحركة</label>
                <textarea id="promptInputImage" rows="3" placeholder="مثلاً: تحريك الصورة بسلاسة مع تأثيرات ضوئية">تحريك الصورة بسلاسة مع تأثيرات ضوئية</textarea>
            </div>
            <div class="image-upload-area" id="imageUploadArea">
                <div class="upload-box" id="uploadBox">
                    <span class="upload-icon">🖼️</span>
                    <p><strong>انقر أو اسحب</strong> صورة هنا</p>
                    <span class="upload-hint">JPG, PNG, WEBP (حتى 5 ميجابايت)</span>
                    <input type="file" id="imageInput" accept="image/*" />
                </div>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="#" alt="معاينة" />
                    <button class="remove-image" id="removeImageBtn">✕</button>
                </div>
            </div>
        </div>

        <!-- OPTIONS -->
        <div class="options-row">
            <div class="option-group">
                <span class="option-label">⏱️ المدة</span>
                <div class="option-buttons" id="durationGroup">
                    <button class="opt-btn" data-value="5">5 ث</button>
                    <button class="opt-btn active" data-value="10">10 ث</button>
                    <button class="opt-btn" data-value="15">15 ث</button>
                </div>
            </div>
            <div class="option-group">
                <span class="option-label">📐 نسبة الأبعاد</span>
                <div class="option-buttons" id="aspectGroup">
                    <button class="opt-btn active" data-value="16:9">16:9</button>
                    <button class="opt-btn" data-value="9:16">9:16</button>
                    <button class="opt-btn" data-value="1:1">1:1</button>
                </div>
            </div>
        </div>

        <!-- GENERATE BUTTON -->
        <button class="generate-btn" id="generateBtn">
            <span class="btn-text">🚀 توليد الفيديو</span>
            <span class="spinner"></span>
        </button>

        <!-- PROGRESS -->
        <div class="progress-wrapper" id="progressWrapper" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">جارٍ التوليد...</div>
        </div>

        <!-- RESULT -->
        <div class="result-wrapper" id="resultWrapper">
            <video id="videoPlayer" controls></video>
            <div class="result-controls">
                <span class="result-label">🐭 mouseDZ-ai</span>
                <button class="download-btn" id="downloadBtn">⬇️ تحميل</button>
            </div>
        </div>

        <!-- STATUS -->
        <div class="status-box">
            <div class="status-item" id="statusApi">
                <span class="status-icon">🔑</span>
                <span class="status-text">التحقق من المفتاح...</span>
            </div>
        </div>

        <!-- LOG -->
        <div class="log-box" id="logBox">
            <div class="log-entry info"><span class="time">[الآن]</span> 🐭 مرحباً بك في mouseDZ-ai!</div>
            <div class="log-entry info"><span class="time">[الآن]</span> 📝 اكتب وصفاً واحصل على فيديو</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
